name: Checkstyle Analysis

on:
  push:
    branches: [ main, "fix/**", "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  checkstyle:
    name: Run Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run Checkstyle - customers-service
        run: ./mvnw checkstyle:checkstyle -pl spring-petclinic-customers-service -am --no-transfer-progress
        continue-on-error: true

      - name: Run Checkstyle - visits-service
        run: ./mvnw checkstyle:checkstyle -pl spring-petclinic-visits-service -am --no-transfer-progress
        continue-on-error: true

      - name: Run Checkstyle - vets-service
        run: ./mvnw checkstyle:checkstyle -pl spring-petclinic-vets-service -am --no-transfer-progress
        continue-on-error: true

      - name: Run Checkstyle - api-gateway
        run: ./mvnw checkstyle:checkstyle -pl spring-petclinic-api-gateway -am --no-transfer-progress
        continue-on-error: true

      - name: Upload Checkstyle reports
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: |
            spring-petclinic-customers-service/target/reports/checkstyle.html
            spring-petclinic-visits-service/target/reports/checkstyle.html
            spring-petclinic-vets-service/target/reports/checkstyle.html
            spring-petclinic-api-gateway/target/reports/checkstyle.html