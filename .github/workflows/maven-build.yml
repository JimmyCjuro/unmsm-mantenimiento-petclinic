name: CI Pipeline — Spring PetClinic Microservices

on:
  push:
    branches: [ main, "fix/**", "feature/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-analyze:
    name: Build, Test & Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      # ── STAGE 4: BUILD ─────────────────────────────────────
      - name: Build — compilar todos los módulos
        run: ./mvnw clean package -DskipTests --no-transfer-progress
        continue-on-error: true

      # ── STAGE 5: TESTS ─────────────────────────────────────
      - name: Run Tests — pruebas automáticas
        run: ./mvnw test --no-transfer-progress
        continue-on-error: true

      # ── STAGES 6-9: CHECKSTYLE ─────────────────────────────
      - name: Run Checkstyle - customers-service
        run: ./mvnw checkstyle:checkstyle -pl spring-petclinic-customers-service -am --no-transfer-progress
        continue-on-error: true

      - name: Run Checkstyle - visits-service
        run: ./mvnw checkstyle:checkstyle -pl spring-petclinic-visits-service -am --no-transfer-progress
        continue-on-error: true

      - name: Run Checkstyle - vets-service
        run: ./mvnw checkstyle:checkstyle -pl spring-petclinic-vets-service -am --no-transfer-progress
        continue-on-error: true

      - name: Run Checkstyle - api-gateway
        run: ./mvnw checkstyle:checkstyle -pl spring-petclinic-api-gateway -am --no-transfer-progress
        continue-on-error: true

      # ── STAGE 10: ARTEFACTOS ───────────────────────────────
      - name: Upload Checkstyle reports
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: "**/target/reports/checkstyle.html"
